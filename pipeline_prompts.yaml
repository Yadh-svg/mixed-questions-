      - Ensure every blank tests understanding, not guessing.
      - Output language must be English
       - The solution for all questions and sub-questions must follow the **specific strategy or method** explicitly mentioned under *Concepts* for that chapter (for example, box method, lattice method, partial quotient, repeated addition, etc.).  
              - If the chapter introduces or emphasizes a particular technique (e.g., Box Method for multiplication), then **every relevant calculation in that chapter** must use the same technique, even in simpler sub-questions (both question and solution).  
              - This ensures consistency with what the student is currently being taught at that grade level.  
              - Only if no specific method is mentioned in the concepts should the general grade-appropriate method be used.
      </key_idea rules>
      <knowledge_boundary>
          Treat the uploaded PDFs/images as the only source of knowledge.
          Do not use any outside syllabus, curriculum, or textbook knowledge.
          Do not introduce concepts, terminology, skills, or grade-level content that is not explicitly shown in the uploaded material(for question, solution, key-idea for everything. You cant assume if lhs = rhs is not mentioned in the uploaded material but its proving left side = right side, you cant mention lhs = rhs in any part of the generated material).
          If the material shows addition, subtraction, even/odd numbers, halving, or true/false reasoning, generate new items only using those same concepts. Do not name properties, laws, or theories unless they are explicitly printed in the PDF/image.

          Before writing anything, silently read the chapter and answer 
          these three questions:

          1. HOW does the chapter explain this concept?
            — What words does it use for this idea?
            — Example: does it say "angle" or "turn" or "rotation"?
            — Does it say "multiply" or "groups of"?
            — Does it say "divide" or "share equally"?
            — Use ONLY the chapter's own words. Never upgrade to 
              the standard mathematical term if the chapter avoids it.

          2. HOW does the chapter solve problems of this type?
            — What method or steps does it show?
            — Example: does it use a number line, finger counting, 
              grouping objects, factor trees, long division, or 
              repeated subtraction?
            — Your solutions must follow the SAME method, 
              in the SAME order of steps.

            SOLUTION METHOD LOCK (MANDATORY):
            — Never use a more efficient or advanced method 
              even if it gives the same answer faster.
            — If the chapter solves multiplication by writing 
              repeated addition (3 × 4 = 4 + 4 + 4), 
              your solution must also use repeated addition.
            — If the chapter uses the box method for multiplication, 
              every multiplication step in every solution 
              must use the box method.
            — If the chapter uses grouping circles drawn around 
              objects to show division, your solution must 
              describe that same grouping process.
            — The method is not optional. It is the answer 
              to "how this chapter expects students to think."

            SELF-CHECK FOR EVERY SOLUTION STEP:
            "Is this exactly how the chapter would show 
            a student solving this step?"
            YES → keep it.
            NO  → rewrite using the chapter's method.

          3. WHAT does the chapter NOT use?
            — Identify terms, symbols, or methods that are 
              mathematically related but absent from the chapter.
            — These are banned — even if they are correct, 
              even if they feel natural, even if a higher grade uses them.
            — Example: chapter groups objects but never writes 
              the word "multiplication" → that word is banned.
            — Example: chapter draws arrows on a grid but never 
              writes "coordinate" → that word is banned.

          APPLY THIS TO EVERYTHING:

          - The solution must use only the method this chapter teaches.
          - The key idea must explain using only this chapter's language.

          ONE LINE TEST BEFORE OUTPUT:
          "If a student who has only read this chapter — 
          and nothing else — reads my  solution, 
          will every word and method feel familiar to them?"
          
          YES → proceed.
          NO  → rewrite using only what the chapter contains.

       
      </knowledge_boundary>
      <what_not_to_do>
        - Do not use any physics, chemistry, biology, or other science formulas (e.g., density, force, pressure, velocity).
        - Do not use any real-world scenarios that are not related to the topic.
        - **Do NOT treat the textbook/concept excerpts as reading passages in questions**
        - **Do NOT reference the textbook/concept material as a passage**
        - Questions must be self-contained and NEVER reference the source material directly
        All generated  solutions must be fully standalone and must NOT reference textbook pages, chapters, passages, or excerpts. Do NOT treat the textbook content as a passage to be quoted or cited.

        **FORBIDDEN question/Answer patterns:**
        - ❌ "According to the textbook..."
        - ❌ "According to the definition provided in the chapter..."
        - ❌ "The story on page 13 mentions..."
        - ❌ "The definition on page X specifically states..."
        - ❌ "Based on the passage/story/definition provided..."
        - ❌ "As described in the concept/chapter..."
        - ❌ " identify the relationship between Row 2 and Row 3 based on Theorem 6.6."
        - All generated q solutions must be fully standalone and must NOT reference textbook pages, chapters, passages, or excerpts. Do NOT treat the textbook content as a passage to be quoted or cited("According to the textbook...","According to the definition provided in the chapter...").
        - You may use the *result* of a theorem/proof for application-based questions, but do not ask the student to reproduce the proof itself.
      
      </what_not_to_do>
      <PDF_SOLUTION_RESTRICTION>

        A textbook PDF may be provided as reference. The solution must strictly rely on this PDF.

        PERMITTED — use the PDF ONLY for:
        ✓ Identifying the exact concept and its formal definition  
        ✓ Using the formulas shown in the PDF  
        ✓ Using the problem-solving methods demonstrated in the PDF  
        ✓ Following the same type of reasoning steps used in the PDF  
        ✓ Using the mathematical notation used in the PDF  
        ✓ Confirming which subtopics belong to this section  

        MANDATORY RULE:
        All formulas, methods, steps, and reasoning used in the solution MUST come only from the PDF.

        BANNED — never use:
        ✗ Any formula not shown in the PDF  
        ✗ Any shortcut or alternate method not demonstrated in the PDF  
        ✗ Any notation, terminology, or symbol not used in the PDF  
        ✗ Any higher-grade concept that does not appear in the PDF  

        Before writing the solution, verify:
        • The formula used appears in the PDF  
        • The solving method is demonstrated in the PDF  
        • The notation matches the PDF  

        If any step cannot be traced back to the PDF, it must not be used.

        The PDF is the only valid source for constructing the solution.

      </PDF_SOLUTION_RESTRICTION>
    </requirement>
    <output_format>
        Return a valid JSON object 
        Formatting rules:
        - JSON must be strictly valid.
        - \n to separate lines or steps
        - \n\n to separate paragraphs or major sections (inside solution steps or options, each steps should be present in next line to visually separate them)
        IMPORTANT OUTPUT FORMAT RULE:
          Apply ALL math formatting rules (plain Markdown, no LaTeX, symbol usage, etc.)
          ONLY inside JSON string values (text enclosed within " ").
          • Use ONLY plain Markdown text.
          • DO NOT use LaTeX or TeX in any form.

          Math formatting rules:
          • Write all mathematical expressions in readable plain text.
          • Use standard symbols like + − × ÷ = √ ^ ( ) |.
          • Use Unicode superscripts/subscripts where appropriate (e.g., x², a³, sin⁻¹).
          • Write fractions inline using / (e.g., x/a, (a² − x²)¹ᐟ²).

          STRICTLY FORBIDDEN:
          • Do NOT use $, $$, \( \), or any LaTeX math delimiters.
          • Do NOT use \frac, \sqrt, \times, \sin, \cos, or any backslash commands.
          • Do NOT use LaTeX environments or math notation.

          Examples:
          ✔ Correct: sin⁻¹(x / √(a² − x²)) = cos⁻¹(x / a)
          ✘ Incorrect: $\sin^{-1}\left(\frac{x}{\sqrt{a^2-x^2}}\right)$
        {
          
          {{Core_Skill_Output_Instruction}}"questions": [
            {
              "question_id": "Q1 (matching input)",
