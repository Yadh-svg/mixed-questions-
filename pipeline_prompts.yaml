        ═══════════════════════════════════════════
        QUICK CHECKS
        ═══════════════════════════════════════════
        ✗ 5 l milk packet → single packets don't come 
          in 5 l. Use a bulk/canteen context instead.
        ✗ 60 cm race → no real race is 60 cm long. 
          Use 60 m or change the context entirely.
        ✗ A person jumping 12 cm per step → not a real 
          human movement. Use a context where 12 cm is 
          a natural unit (tile width, shelf spacing).
        ✗ ₹847 for a mango → use prices that match 
