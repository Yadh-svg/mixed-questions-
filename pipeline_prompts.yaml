    - after metadata lines (topic, marks, etc.)
    - before and after the question paragraph
    - before "Options"after option:(even each option should have a blank line after it)
    - after the options list
    - before "Answer key"(even each answer key should have a blank line after it)
    - after the answer line
    - before "Solution"
    - between EACH solution step
    - before "Distractor Analysis"

  3. Options must be on separate lines (never inline).
  4. Solution steps must be on separate lines.
  5. No paragraph merging.
  6. No inline section labels.
  7. Output must look like a printed exam page.
    Example Output for 2 duplicates:
  ---DUPLICATE_1---
  **Duplicate built using parent key idea: {{QUESTION_CODE}}**
  
  Topic Used: nth term of an ap
  An event organizer...
  
  **Options:**
  A) ...
  B) ...

  **Solution:**
  ...

  ---DUPLICATE_2---
  **Duplicate built using parent key idea: {{QUESTION_CODE}}**

  [Full question markdown here...]

  IMPORTANT OUTPUT FORMAT RULE:
    Apply ALL math formatting rules (plain Markdown, no LaTeX, symbol usage, etc.)
    • Use ONLY plain Markdown text.
    • DO NOT use LaTeX or TeX in any form.

    Math formatting rules:
    • Write all mathematical expressions in readable plain text.
    • Use standard symbols like + − × ÷ = √ ^ ( ) |.
    • Use Unicode superscripts/subscripts where appropriate (e.g., x², a³, sin⁻¹).
    • Write fractions inline using / (e.g., x/a, (a² − x²)¹ᐟ²).

    STRICTLY FORBIDDEN:
    • Do NOT use $, $$, \( \), or any LaTeX math delimiters.
    • Do NOT use \frac, \sqrt, \times, \sin, \cos, or any backslash commands.
    • Do NOT use LaTeX environments or math notation.

    Examples:
    ✔ Correct: sin⁻¹(x / √(a² − x²)) = cos⁻¹(x / a)
    ✘ Incorrect: $\sin^{-1}\left(\frac{x}{\sqrt{a^2-x^2}}\right)$

    All output MUST remain valid Markdown and must be copy-paste friendly.


regeneration_prompt: |
  <regeneration>
    <context>
      You are an expert Question Designer & Repair Agent.
      A previously generated question needs to be regenerated or repaired based on specific user feedback.
    </context>
    
        <input_material>
          <previous_question>
    {{PREVIOUS_QUESTION}}
          </previous_question>
          
          <regeneration_reason>
    {{REGENERATION_REASON}}
          </regeneration_reason>
          
          <additional_context>
    {{ADDITIONAL_NOTES}}
          </additional_context>
        </input_material>

    <task>
      Read the previous question and the regeneration reason carefully.
      Modify the previous question ONLY according to the regeneration reason.
      Do not change the fundamental structure, DOK level, taxonomy, or anything else unless explicitly requested in the reason.
      Ensure the mathematical concepts remain correct and the solution aligns with the new question.
      If there is a PDF file provided as context, refer to it if the user asks you to extract new information from it.
      
      FORMAT REQUIREMENTS
      Output ONLY the rebuilt question in the same markdown format as the previous question.
      Include the Sub-questions, Options, Answer Key, Solution, Key Idea, etc. just as they were formatted before, incorporating your fixes.
      DO NOT output any JSON, XML wrappers, or extra explanation outside the markdown of the question itself.
    </task>
  </regeneration>
