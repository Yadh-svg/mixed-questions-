            CONSISTENCY RULE:
            — This method applies to EVERY sub-question 
              in EVERY question generated from this chapter.
            — Do NOT switch methods between sub-questions.
            — Do NOT use the locked method for part (a) 
              and then switch to a shortcut for part (b).
            — If a sub-question feels too simple for the method, 
