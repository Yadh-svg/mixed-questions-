                  nature, weather, cooking, farming, trade.

        STEP 3 — Pick the situation where the math is invisible —
                  it exists only because of how things are physically
                  arranged, timed, or divided in that situation.

        STEP 4 — Write the scenario describing only the physical situation.
                  Never name, hint at, or perform the math inside the scenario.

        ═══════════════════════════════════════════
        THE INVENTED RULE TEST
        ═══════════════════════════════════════════

        Before finalising, ask:
        "Does this scenario only work because 
        a CHARACTER decided to follow a 
        mathematical rule?"

        ✗ A rickshaw stops at every 4th house 
          → someone decided that rule
        ✗ A worker sorts by divisible numbers 
          → someone decided that rule  
        ✗ A child collects every 3rd card 
          → someone decided that rule

        REAL scenarios work because a PHYSICAL 
        OBJECT has a fixed natural property —
        not because a person chose a math pattern.

        Tile width is fixed → not a choice.
        Crate capacity is fixed → not a choice.
        Packet size is fixed → not a choice.

        If the math exists because a CHARACTER 
        CHOSE to follow it → banned.
        If the math exists because an OBJECT 
        FORCED it → allowed.

        ═══════════════════════════════════════════
        TOPIC-SPECIFIC BANNED PATTERNS
        ═══════════════════════════════════════════

        FRACTIONS / RATIO:
        ✗ "Ravi ate 3/5 of a pizza"
        WHY: Nobody thinks of food in exact 
        fractions while eating. Unrealistic action.

        PERCENTAGE:
        ✗ "A shopkeeper gives exactly 20% discount"
        WHY: Classic textbook costume. Every 
        student has seen this 100 times.

        ALGEBRA / EQUATIONS:
        ✗ "Think of a number, double it, add 5"
        WHY: Nobody does this in real life. 
        Pure math wearing no costume at all.

        GEOMETRY / AREA:
        ✗ "A rectangular garden has length X 
        and breadth Y"
        WHY: Gardens aren't introduced this way 
        in real life. Too abstract and direct.

        SPEED / DISTANCE:
        ✗ "Two trains leave stations simultaneously"
        ✗ "A car travels at 60 km/h"
        WHY: Iconic textbook templates. 
        Students recognise these instantly.

        ═══════════════════════════════════════════
        PERMANENTLY BANNED — regardless of topic or grade
        ═══════════════════════════════════════════

        ✗ Animals, insects, or pets performing human actions
          (jumping, counting, racing, playing).

        ✗ Fictional or invented mechanisms
          (secret boxes, magic multipliers, mystery machines).

        ✗ People deliberately doing math inside the scenario
          (a character counting steps, measuring angles on purpose,
          solving a pattern, discovering a rule).

        ✗ Game boards, numbered grids, or numbered tiles used as
          the core object — these are math tools, not real-life objects.

        ✗ Any situation that only exists because the question needs it to.
          If the situation would disappear without the math → it is banned.
        a boy jumps 12 cm or animals playing ludo wiith childrens, or a persons buys 100 kg of fruits

        ═══════════════════════════════════════════
        BANNED SCENARIO PATTERNS — WITH REASONS
        ═══════════════════════════════════════════

        ✗ "Rickshaw A stops at every 4th house, 
          Rickshaw B stops at every 6th house"
        WHY: Stopping intervals are a math rule 
        wearing a delivery costume. Not real.

        ✗ "Letters are sorted into bins based on 
          codes divisible by 5"
        WHY: No real sorting system uses 
        divisibility as a physical rule.

        ✗ "A boy jumps 4 steps at a time on 
          a numbered staircase"
        WHY: People don't count steps in fixed 
        mathematical intervals in real life.

        ✗ "Two pipes fill a tank in X and Y hours"
        WHY: Classic textbook costume. The tank 
        and pipes exist only for the math.

        NEGATIVE EXAMPLE RULE:
          If a scenario appears in this banned list — 
          or smells like any scenario in this list — 
          stop and rebuild from a real physical object.

          Do not adjust the banned scenario. 
          Do not rename the characters. 
          Discard it completely and start fresh.

        ═══════════════════════════════════════════
        GRADE-APPROPRIATE CONTEXT GUIDANCE
        ═══════════════════════════════════════════

        The model must independently select a context that matches
        the student's age and lived experience at that grade:

        - Grade 1–3  → home, kitchen, toys, food, family routines.
        - Grade 4–6  → market, school trips, sports, simple tools,
                      local transport, small construction.etc .. 
        - Grade 7–9  → workshops, agriculture, architecture, trade,
                      civic spaces, maps, measurement tasks.etc .. 
        - Grade 10–12 → engineering layouts, land surveying, financial
                        planning, industrial processes, infrastructure.etc ..

        The model must choose freely from its own knowledge of real-world
        contexts at the right grade level. No fixed list is provided.
        Variety and freshness are required every time.

        ═══════════════════════════════════════════
        FINAL CHECK BEFORE OUTPUTTING THE SCENARIO
        ═══════════════════════════════════════════

        Read the scenario and answer all three:

        1. Can this scene exist in real life without any math involved? (YES / NO)
        2. Is the math invisible — hidden inside the physical arrangement? (YES / NO)
        3. Would a stranger reading this simply see an ordinary real-life moment? (YES / NO)

        All three must be YES. Even one NO → rewrite completely.
        - should be indian based names and environment


        <Unit Realism Rule>

        Every quantity and unit must match how that thing 
        actually exists in real Indian life.

        Before using any measurement ask:
        "Does this quantity exist in this size in India —
        and is it actually sold, used, or measured 
        this way in practice?"

        YES → allowed.
        NO  → change the number, unit, or context 
