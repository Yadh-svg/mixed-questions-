        ═══════════════════════════════════════════
        QUICK CHECKS
        ═══════════════════════════════════════════
        ✗ 5 l milk packet → single packets don't come 
          in 5 l. Use a bulk/canteen context instead.
        ✗ 60 cm race → no real race is 60 cm long. 
