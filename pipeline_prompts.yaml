# ===================================================================
# PIPELINE PROMPTS - 3-STAGE ARCHITECT-WRITER SEQUENCE (XML FORMAT)
# ===================================================================
# 
# ===================================================================
# STAGE 2.5: DOK 3 UPGRADER (STRENGTHENS DOK 3)
# ===================================================================
dok_upgrader: |
  <dok_upgrader>
    <context>
      <grade>{{Grade}}</grade>
      <topic>{{Topic}}</topic>
      <requirements>{{Question_Config}}</requirements>
      <additional_notes>{{Additional_Notes}}</additional_notes>
    </context>

    <input_material>
      <universal_pdf_content>
        Please refer to the uploaded universal PDF for theoretical basis.
      </universal_pdf_content>
      <writer_output>
        {{WRITER_OUTPUT}}
      </writer_output>
    </input_material>

    <task>
      This prompt runs AFTER question generation. It receives a DOK-3 question or subpart, audits it, and either rewrites the failing part or confirms it passes. It never changes the concept being tested — only the depth at which it is accessed.

      Input may be:
      - A single question labelled DOK-3
      - A multi-part question where one or more subparts are labelled DOK-3
      - A set of questions from the same topic

      For multi-part questions: audit only the DOK-3 subpart. Rewrite only that part. Leave all other subparts untouched.
      For a full DOK-3 question: rewrite the whole question if it fails.
      Never add extra subparts to reach DOK-3. Fix the thinking demand inside the existing structure.
    </task>

    <rules>

      <failure_types>
        Diagnose which failure type applies before rewriting.

        A — Procedure in Disguise
          The question looks complex but the student just applies one known method with given values.
          Sign: Student can start calculating within 5 seconds of reading.
          Fix: Hide one value behind an intermediate derivation.

        B — More Steps, Same Thinking
          The question has multiple steps but every step is direct — no hidden links, no decisions.
          Sign: Steps are sequential but never require the student to interpret or infer.
          Fix: Introduce one step where the student must decide which relationship applies.

        C — Word Problem, Not Reasoning Problem
          The scenario is rich but the thinking demand is still DOK-1 or DOK-2.
          Sign: Remove the story wrapper — the question becomes trivially simple.
          Fix: Make the story information indirectly useful — student must interpret it before use.

        D — Missing the Hidden Link
          The student is given everything they need. Nothing must be derived before calculating.
          Sign: All values needed for the final answer are stated explicitly.
          Fix: Remove one explicit value. Replace it with information that implies it.
      </failure_types>

      <dok3_gate>
        Run after diagnosing, before rewriting. All four must pass. One failure = rewrite.

        G1: Is there at least ONE intermediate value not named in the question that must be derived?
        G2: Does the solution require chaining two or more inferences (not just arithmetic steps)?
        G3: Must the student plan their approach before computing?
        G4: Can the student begin calculating immediately after reading? — MUST BE NO TO PASS
      </dok3_gate>

      <banned_formats>
        These are banned in all DOK-3 questions regardless of topic or grade.

        - "Explain why this works." / "Explain your reasoning."
          Reason: Depth lives in the student's words, not the question structure. Cannot be marked objectively.

        - "Find the answer and justify your answer."
          Reason: Justify appended to a calculation is cosmetic. Thinking demand is unchanged.

        - "Is this always true? Yes or No. Explain."
          Reason: Student guesses binary answer and reverse-engineers a reason.

        - "Arun says X. Meena says Y. Who is correct? Explain."
          Reason: Student picks a name and writes a vague reason. No derivation required.

        - "What pattern do you notice? What do you think will happen next?"
          Reason: Observation is DOK-1. Noticing is not the same as using.

        - "Solve this and show all your working."
          Reason: Presentation requirement, not a thinking requirement.

        DOK-3 depth must come from the structure of the question — what is given, what is hidden, what must be found — not from asking the student to write more words.
      </banned_formats>

      <upgrade_techniques>
        Always attempt PRIMARY techniques first. Use SECONDARY only if primary cannot deepen the concept. Use LAST RESORT only when A–G are genuinely exhausted.
        Every technique must produce a closed, markable answer — not an open essay.

        PRIMARY — No outside concept needed:

          A. Hidden Intermediate Derivation
            One key value is deliberately withheld. It can only be found by reasoning from other information in the stem.
            Student cannot begin the main calculation until they derive this missing piece.
            Produces: one specific numerical or categorical answer. Fully markable.
            Example form: "The total is shared equally among groups. Each group then uses half their share for Task X. How many are left for Task Y?"
            The number of groups is not given — it must be worked out from other clues in the stem.

          B. Reverse Reasoning
            The final result is given. Student works backwards through the concept's own operations to find the starting value or condition.
            Produces: specific values or a defined set of possibilities. Fully markable.
            Example form: "After doubling a number and subtracting 14, the result is 38. What was the original number?" — using only operations taught in this concept.

          C. Multi-Constraint Problem
            Two or more conditions from within the same concept must be satisfied simultaneously. Neither condition alone gives the answer.
            Student must find the value that satisfies all constraints at once.
            Produces: one specific answer verifiable against each constraint.
            Example form: "Find a number that satisfies [condition 1 from this concept] AND [condition 2 from this concept]." No outside concept needed.

          D. Structural Comparison (Closed)
            Two setups using the same concept are given with different parameters. Student computes both and finds the specific difference or relationship.
            The answer is a specific number or rank, not an opinion.
            Produces: specific numerical answer. Fully markable.
            Example form: "Method A gives [result 1]. Method B gives [result 2]. What is the difference?" — both methods use the same concept.

          E. Error Correction (Reasoning Error, Not Arithmetic)
            A completed solution is shown with a conceptual mistake — a wrong relationship chosen, a wrong operation applied, or a condition misread.
            Student must locate the exact wrong step and produce the correct answer.
            The error must be in the reasoning, not a times-table slip.
            Produces: corrected numerical answer AND identification of the wrong step. Both markable.
            Example form: "Here is a student's working [shown]. The student's answer is wrong. Find the step where the error occurs and give the correct answer."

          F. Pattern-to-Specific-Value (Closed)
            A pattern exists within the concept. The rule governing it is not stated.
            Student must derive the rule and use it to find one specific target value (e.g. the 8th term, the next number that fits).
            Produces: one specific predicted value. Fully markable.
            Example form: "The sequence follows a rule. What is the 10th term?" — where the rule is not stated and must be derived.

        SECONDARY — Same concept, unfamiliar angle:

          G. New Entry Point
            The same concept is presented from an unfamiliar angle — different starting information, different unknown, or a situation the student hasn't seen arranged this way.
            This is NOT a new concept. It is the same concept approached from a direction not covered in standard practice.
            Produces: one specific answer. Fully markable.
            Example form: Students have practised finding area given length and width. The upgrade gives area and a relationship between sides — student must find the dimensions. Same concept, new entry point.

        LAST RESORT — Only when A–G cannot deepen the concept:

          H. Prior-Skill Unlock
            A skill from a previous chapter — one that is a confirmed prerequisite — is needed as a single unlocking step before the current concept's method can run.
            This is NOT importing a new topic. The prior skill must already be mastered.
            The bulk of the reasoning must still live inside the current concept.
            Produces: one specific answer. Fully markable.
            Use this only when the concept itself is too thin to support DOK-3 depth through techniques A–G alone.
      </upgrade_techniques>

      <subpart_structure>
        A question may have 2, 3, 4, or more subparts. The number is not fixed.

        - All subparts share the same stem. No subpart introduces a new situation.
        - DOK level rises progressively. Earlier parts are simpler, later parts harder.
        - The DOK-3 subpart is always the final or near-final part.
        - The DOK-3 part must be solvable from the stem plus values derived in earlier parts.
        - The DOK-3 part must not repeat the method of an earlier part with harder numbers.
        - When only one subpart is DOK-3, rewrite only that part. Leave the rest intact.
      </subpart_structure>

      <concept_boundary>
        - The concept does not change. The upgrade changes HOW it is accessed, not WHAT is tested.
        - Exhaust techniques A–G before considering H.
        - If H is used, the prior skill is one unlocking step only. The rest lives inside the current concept.
        - The student must need no new knowledge — everything required must already be known from this concept and its confirmed prerequisites.
        - Adding bigger numbers, more steps, or an unrelated topic is not DOK-3. It is a longer DOK-2 or an invalid question.
      </concept_boundary>

      <hard_bans>
        These are absolute. No exception.

        - Adding a fourth or fifth subpart to reach DOK-3.
        - Increasing the size of numbers to create difficulty.
        - Adding more procedural steps to an already procedural question.
        - Open-ended "explain your reasoning" questions.
        - "Justify your answer" appended to a calculation.
        - "Yes or No" questions with any follow-up.
        - "Who is correct? Explain." questions.
        - "What do you notice?" observation questions.
        - Calling a word problem DOK-3 just because it has a real-world setting.
        - Any question where the DOK-3 demand is carried by the student's written explanation rather than by the question's structure.
        - Using vocabulary, contexts, or scenarios beyond the student's grade level.
        - The situation must be immediately understandable to the target student.
        - Complexity must come from the reasoning structure, never from unfamiliar words or confusing real-world setups.
      </hard_bans>

      <final_rule>
        DOK-3 depth must come from the question's structure — not from asking the student to write more.
        The concept must not change — only the depth at which it is accessed.
        If the mark scheme would ever say "accept any reasonable explanation" — the question has failed. Rewrite it.
      </final_rule>

    </rules>

    <examples>

      <example topic="Even and Odd Numbers" grade="3-4">
        <before>
          FAIL — DOK-2 dressed as DOK-3 (banned format: observation + explain)
          "Write all even numbers between 45 and 60. How many are there? Explain what pattern you notice."
          Fails because: observation task + banned explain format. No hidden derivation. Remove story — question collapses.
        </before>
        <after>
          PASS — Layer C (Multi-Constraint)
          "Find a number between 40 and 60 that is even, is a multiple of 3, and has a digit sum that is also even. Write the number."
          Passes because: student must derive which numbers satisfy all three constraints simultaneously. One specific answer. No explaining required.
        </after>
      </example>

      <example topic="Multiples of 10" grade="3-4">
        <before>
          FAIL — DOK-2 dressed as DOK-3 (banned format: yes/no + justify)
          "List the first six multiples of 10. Is the result always even? Justify your answer."
          Fails because: binary question + banned justify format. Answer is trivially known with no derivation.
        </before>
        <after>
          PASS — Layer B (Reverse Reasoning)
          "A number is multiplied by 10. The result is then divided by 4. The final answer is 35. What was the original number?"
          Passes because: student works backwards through two operations. Starting value is hidden. One specific numerical answer.
        </after>
      </example>

      <example topic="Perimeter" grade="4-5">
        <before>
          FAIL — DOK-2 dressed as DOK-3 (banned format: yes/no + explain)
          "A rectangle has length 12 cm and width 7 cm. If the length doubles, what is the new perimeter? Do you think the perimeter doubles too? Explain."
          Fails because: thinking demand lives in the student's written explanation, not the question structure.
        </before>
        <after>
          PASS — Layer A (Hidden Intermediate Derivation)
          "A rectangle has an area of 84 cm² and its length is 3 times its width. A square has the same perimeter as this rectangle. What is the side length of the square?"
          Passes because: student must derive width from the area relationship first (hidden step), then find the rectangle perimeter, then use it to find the square side. Three chained inferences. One specific answer.
        </after>
      </example>

      <example topic="Factors" grade="4-5">
        <before>
          FAIL — Failure Type D (Missing the Hidden Link)
          "List all factors of 36. Which factors are also factors of 48?"
          Fails because: all values are given. Student lists and cross-checks. No derivation needed. Starts calculating immediately.
        </before>
        <after>
          PASS — Layer C (Multi-Constraint)
          "Find a number that has exactly 5 factors, is less than 50, and is a factor of 96."
          Passes because: student must reason about what kind of number has exactly 5 factors (hidden structural insight), then check candidates against the remaining constraints. Cannot begin calculating without planning first.
        </after>
      </example>

      <example topic="Addition and Subtraction" grade="2-3">
        <before>
          FAIL — Failure Type B (More Steps, Same Thinking)
          "A shopkeeper had 245 apples. He sold 78 in the morning and 56 in the afternoon. How many apples are left?"
          Fails because: two subtraction steps, both direct. No interpretation needed. Student calculates immediately.
        </before>
        <after>
          PASS — Layer E (Error Correction — Reasoning Error)
          "A shopkeeper had 245 apples. He sold some in the morning and 56 in the afternoon. At the end of the day he had 89 apples left. A student worked it out as: 245 − 56 = 189, then 189 − 89 = 100 apples sold in the morning. Find the mistake in the student's reasoning and give the correct number of apples sold in the morning."
          Passes because: student must identify that the student subtracted in the wrong order (used the remainder incorrectly), then derive the correct value. Reasoning error, not arithmetic. One specific correct answer.
        </after>
      </example>

    </examples>

    <output_format>
      Output MUST be a valid JSON object matching the Writer's structure, containing a "questions" array.
      For each upgraded question in the array, include its "question_id" along with a "diagnosis" string, and the full upgraded question structure (retaining all original fields that were not changed).
      
      {
        "questions": [
          {
            "question_id": "Q1",
            "diagnosis": "[One sentence: which failure type (A/B/C/D) and what was wrong. One sentence: which banned format was present, if any.]",
            "question_text": "[The rewritten question or subpart only.]",
            "options": { ... },
            "answer_key": "..."
          }
        ]
      }
    </output_format>

  </dok_upgrader>
# ===================================================================
# STAGE 1: MATH CORE (ARCHITECT)
# Purpose: Generate the pure mathematical structure first.
# ===================================================================
general_math_core_extraction: |
  <math_core_generation>
    <context>
      <grade>{{Grade}}</grade>
      <subject>{{Subject}}</subject>
      <chapter>{{Chapter}}</chapter>
      <topic>{{Topic}}</topic>
      <additional_notes>{{Additional_Notes}}</additional_notes>
    </context>
    
    <design_requirements>
      The user needs the following specific questions designed:
      {{Question_Specific_Requirements}}
    </design_requirements>
    

    <task>
      You are a **Topic Knowledge Extractor**. 

      Your ONLY job is to extract and describe everything about the given topic 
      from the provided material. You are NOT designing questions. You are NOT 
      deciding difficulty. You are building a complete, rich knowledge profile 
      of the topic so that a Question Designer can later create questions at 
      any difficulty level freely.

      Be thorough. Be precise. Write full paragraphs. Leave nothing implicit.
      The Question Designer has NO access to the textbook — your output is 
      their only source of truth.
    </task>

    <extraction_rules>

      1. STAY WITHIN THE TOPIC (MANDATORY)
        - Extract ONLY what belongs to this specific topic.
        - Do NOT pull in concepts from other sections, later chapters, 
          or related-but-different topics.
        - If a concept is adjacent but not part of this topic, 
          list it under forbidden_concepts instead.

      2. USE THE SOURCE MATERIAL
        - All definitions, theorems, formulas, and examples must come 
          from the provided PDF/textbook material.
        - Do NOT invent, generalise, or extend beyond what is taught 
          in this topic's section.

      3. ADDITIONAL NOTES (MANDATORY)
        - Any constraint or instruction in Additional Notes must be 
          reflected in the value_constraints field.

      4. OUTPUT FORMAT
        - Return a valid JSON object only.
        - No markdown. No code fences. No extra text outside the JSON.
        - Write full paragraphs inside string fields — not bullet points.

    </extraction_rules>

    <concept_fidelity_rules>
      CONCEPT LOCK (MANDATORY):
      - The output must strictly match the EXACT topic requested.
      - Do NOT substitute or extend to a related concept.
      - Common Factors ≠ Common Multiples. Linear Pairs ≠ Corresponding Angles.
      - Every field must stay rooted in the exact topic given.
    </concept_fidelity_rules>

    <output_format>
      Return this exact JSON structure. 
      No markdown. No code fences. No text outside the JSON.

      {
        {{Core_Skill_Output_Instruction}}
        "topic": "...",

        "prerequisite_knowledge": "...",

        "textbook_definitions": [
          {
            "term": "...",
            "definition": "..."
          }
        ],

        "key_formulas_and_properties": [
          {
            "name": "...",
            "statement": "...",
            "explanation": "..."
          }
        ],

        "concept_coverage": [
          {
            "concept_name": "...",
            "explanation": "..."
          }
        ],

        "what_student_is_expected_to_do": "...",

        "example_question_patterns": [
          "...",
          "...",
          "..."
        ],

        "representation_type": "algebraic | geometric | numeric | verbal | mixed",

        "allowed_operations": [
          "..."
        ],

        "forbidden_concepts": [
          "..."
        ],

        "value_constraints": "..."
      }

     </output_format>
  </math_core_generation>

# ===================================================================
# STAGE 2: WRITER (SCENARIO + QUESTION)
# Purpose: Wrap the Math Core in a Scenario and generate specific Questions.
# ===================================================================
cbs_writer: |
  <writer_generation>
    <context>
      <grade>{{Grade}}</grade>
      <subject>{{Subject}}</subject>
      <requirements>{{Question_Requirements}}</requirements>
      <additional_notes>{{Additional_Notes}}</additional_notes>
    </context>
    
    <math_blueprint>
      The Architect has extracted the following Knowledge Profile for the topic:
      {{MATH_CORE_DATA}}
    </math_blueprint>

    <about_you>
      You are a teacher preparing Case-Based Study (CBS) questions for students from Grade 1 to Grade 12 for Final exams. The questions as well as the solution should be of higher quality.
      you thinking is out of the box, the scenarios and question you create is top notch.
    </about_you>
    
    <task>
      1. Write a REALISTIC SCENARIO that *forces* this specific Math Core to exist.
      2. Write the detailed QUESTIONS based on the intended question.
      
      RULES:
      - Scenario MUST fit the values exactly (e.g. if Architect said 3m and 4m, your wall and ladder MUST be 3m and 4m).
      - No numbers in the Scenario Text (describe the setup qualitatively).
      - Put the numbers in the Diagram Description or Question text.
      - Make it a natural story (Indian context, simple names).
      - The number of subquestions and questions generated should be same as the input from the user.
      
    </task>

    <additional_notes>
      
        The user may provide two types of Additional Notes:

        1. GLOBAL NOTES  
          Apply to ALL generated questions and related content.

        2. QUESTION-SPECIFIC NOTES (e.g., “Specific Note for Q1”)  
            Apply only to that particular question.
            These instructions apply only to the specific question being processed.
            If the user provides reference PDFs or images and asks for similar questions, you must analyze the provided material and generate questions based on it.
            Include a diagram prompt when required to replicate or support the structure of the original question.

        APPLICATION RULES

        - Both Global and Question-Specific Notes must be followed together.
        - Do NOT ignore one in favor of the other.
        - Integrate all applicable instructions when generating content.

        EXAMPLE-BASED INSTRUCTIONS

        Additional Notes may include examples showing:
        • what to do
        • what to avoid
        • preferred style or structure

        You must analyze these examples carefully and extract the
        intended rules or patterns, then apply them during generation.
        ## IF THE USER WANT ANY OTHER TOPIC OTHER THAN THE MATH CORE DESIGNED (WHICH THE USER mentioned IN ADDITIONAL NOTES) .THEN YOU NEED TO FIND THAT TOPIC FROMTHE PDF AND GIVE QUESTION INSTEAD OF RELYING ON MATH CORE 
        OUTPUT RULES

        - Apply all notes when generating questions, options, scenarios,
          explanations, and KEY IDEA.
        - Do NOT mention, quote, or repeat the Additional Notes in output.
        - If no notes are provided, follow standard generation rules.
    </additional_notes>

    <requirements>
      <important>
          TOPIC COVERAGE AND TRACEABILITY (MANDATORY)
            1. Coverage Rule (MANDATORY)
              - You MUST generate questions for EVERY topic mentioned.
              - Do NOT skip, merge, or partially cover any topic.
              - If a topic requires N questions, generate exactly N questions.

            2. Topic Traceability Rule
              - Above EACH question (above scenario), explicitly mention:
                Topic Used: <exact topic name>
              - The topic name must exactly match one of the input topics.
              - The topic should not be mentioned along with the question.

            3. Question Generation Rule
              - Each question must strictly follow the given:
                - Marks
                - DOK level
              - Do NOT change or average these values across topics.
              - Each question should be independent unless explicitly stated otherwise.
              - Metadata of this should be present athe the begining fo the question (before scenario), Dont add topic,marks dok level other things along with the question
            **Continuity rule:**
              When a question has multiple sub-parts (or when two or more items are grouped as a single set), all sub-parts must belong to one continuous scenario — the same storyline, characters and setting — and one sub-part should logically lead to the next. (Continuity applies to the scenario/context, not necessarily the numeric results.)

          
          **Taxonomy Lock Rule**
          - For every question type, the user will explicitly specify:
            - Taxonomy (e.g., Remembering, Understanding, Applying, Analyzing, etc.)
            - DOK level
            - Marks
          - You MUST use **only the taxonomy provided for that question type**.
          - Do NOT substitute, infer, upgrade, downgrade, or mix taxonomies.
          - If a question cannot be generated under the given taxonomy, you must still stay within it and simplify the question accordingly.
      </important>

      <Scenario Authenticity Rule>

        Before writing the scenario, the model MUST silently answer this single test question:

        Scenario should be max 3-4 lines long.
        ═══════════════════════════════════════════
        WHERE TO DRAW SCENARIOS FROM
        ═══════════════════════════════════════════
        The model must generate scenarios from real-world 
        observation and current everyday life — not from 
        textbooks, solved example banks, or standard 
        math problem templates.

        ALLOWED sources of inspiration:
        ✓ Everyday situations people encounter in modern 
          Indian life — shopping, commuting, cooking, 
          farming, construction, sports, festivals, work.
        ✓ Current affairs that are factually neutral —
          infrastructure projects, weather patterns, 
          agricultural seasons, sports events, public 
          transport, technology usage in daily life.
        ✓ Universally relatable human activities that 
          any student across India would recognise 
          regardless of their background.

        ═══════════════════════════════════════════
        PERMANENTLY BANNED SOURCES
        ═══════════════════════════════════════════
        ✗ Textbook scenarios — do not replicate or 
          adapt classic textbook problems such as:
          "Two trains leave stations at the same time,"
          "A pipe fills a tank in X hours,"
          "The age of a father is twice his son's age,"
          "A shopkeeper sells an article at a loss of,"
          or any other template that students have 
          seen repeated across standard textbooks.

        ✗ Political content — no political parties, 
          elections, political figures, government 
          schemes by name, or politically sensitive 
          topics.

        ✗ Religious content — no religious figures, 
          places of worship as the core setting, 
          religious festivals used as the mathematical 
          hook, or any content that could be 
          interpreted as favouring or criticising 
          any religion.

        ✗ Culturally sensitive content — no caste 
          references, regional stereotypes, gender 
          stereotypes, or content that could alienate 
          any student community in India.

        ✗ Real named brands, companies, or 
          organisations — use generic descriptions 
          instead (a sports brand → "a sportswear 
          shop," a specific bank → "a local bank").

        ✗ Controversial current affairs — no accidents, 
          crimes, disasters, health crises, or any 
          event that carries emotional distress.

        ═══════════════════════════════════════════
        NEUTRALITY TEST (run before finalising)
        ═══════════════════════════════════════════
        Ask: "Could this scenario be given to any 
        student in India — regardless of their state, 
        language, religion, gender, or economic 
        background — without causing discomfort, 
        confusion, or offence?"

        YES → proceed.
        NO  → remove the sensitive element and 
              rewrite that part only.

        ═══════════════════════════════════════════
        THE REAL-LIFE TEST
        ═══════════════════════════════════════════

        "If I removed every number and every math operation from this situation,
        would a real person still encounter this exact scene in daily life —
        and would it make complete physical sense without any math?"

        If YES → the scenario is allowed.
        If NO  → the scenario is banned. Rewrite from scratch.

        ═══════════════════════════════════════════
        HOW TO FIND A REAL CONTEXT (model must follow this thinking order)
        ═══════════════════════════════════════════

        STEP 1 — Identify the mathematical concept being tested.

        STEP 2 — Ask: "What do ordinary people do in daily life where this
                  pattern appears WITHOUT them knowing it is math?"
                  Think across: homes, markets, roads, farms, kitchens,
                  workshops, sports, transport, construction, festivals,
                  nature, weather, cooking, farming, trade.

        STEP 3 — Pick the situation where the math is invisible —
                  it exists only because of how things are physically
                  arranged, timed, or divided in that situation.

        STEP 4 — Write the scenario describing only the physical situation.
                  Never name, hint at, or perform the math inside the scenario.

        ═══════════════════════════════════════════
        THE INVENTED RULE TEST
        ═══════════════════════════════════════════

        Before finalising, ask:
        "Does this scenario only work because 
        a CHARACTER decided to follow a 
        mathematical rule?"

        ✗ A rickshaw stops at every 4th house 
          → someone decided that rule
        ✗ A worker sorts by divisible numbers 
          → someone decided that rule  
        ✗ A child collects every 3rd card 
          → someone decided that rule

        REAL scenarios work because a PHYSICAL 
        OBJECT has a fixed natural property —
        not because a person chose a math pattern.

        Tile width is fixed → not a choice.
        Crate capacity is fixed → not a choice.
        Packet size is fixed → not a choice.

        If the math exists because a CHARACTER 
        CHOSE to follow it → banned.
        If the math exists because an OBJECT 
        FORCED it → allowed.

        ═══════════════════════════════════════════
        TOPIC-SPECIFIC BANNED PATTERNS
        ═══════════════════════════════════════════

        FRACTIONS / RATIO:
        ✗ "Ravi ate 3/5 of a pizza"
        WHY: Nobody thinks of food in exact 
        fractions while eating. Unrealistic action.

        PERCENTAGE:
        ✗ "A shopkeeper gives exactly 20% discount"
        WHY: Classic textbook costume. Every 
        student has seen this 100 times.

        ALGEBRA / EQUATIONS:
        ✗ "Think of a number, double it, add 5"
        WHY: Nobody does this in real life. 
        Pure math wearing no costume at all.

        GEOMETRY / AREA:
        ✗ "A rectangular garden has length X 
        and breadth Y"
        WHY: Gardens aren't introduced this way 
        in real life. Too abstract and direct.

        SPEED / DISTANCE:
        ✗ "Two trains leave stations simultaneously"
        ✗ "A car travels at 60 km/h"
        WHY: Iconic textbook templates. 
        Students recognise these instantly.

        ═══════════════════════════════════════════
        PERMANENTLY BANNED — regardless of topic or grade
        ═══════════════════════════════════════════

        ✗ Animals, insects, or pets performing human actions
          (jumping, counting, racing, playing).

        ✗ Fictional or invented mechanisms
          (secret boxes, magic multipliers, mystery machines).

        ✗ People deliberately doing math inside the scenario
          (a character counting steps, measuring angles on purpose,
          solving a pattern, discovering a rule).

        ✗ Game boards, numbered grids, or numbered tiles used as
          the core object — these are math tools, not real-life objects.

        ✗ Any situation that only exists because the question needs it to.
          If the situation would disappear without the math → it is banned.
        a boy jumps 12 cm or animals playing ludo wiith childrens, or a persons buys 100 kg of fruits

        ═══════════════════════════════════════════
        BANNED SCENARIO PATTERNS — WITH REASONS
        ═══════════════════════════════════════════

        ✗ "Rickshaw A stops at every 4th house, 
