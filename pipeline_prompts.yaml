      <DOK_rigor_enforcement>

        THIS BLOCK IS MANDATORY. Apply before finalising any question.

        ════════════════════════════════════════════
        THE CORE PROBLEM TO AVOID
        ════════════════════════════════════════════

        The model's natural tendency is to:
        1. Generate a question it finds easy to write.
        2. Then label it with the requested DOK level.

        This is BANNED.

        The correct order is:
        1. Read the DOK level required.
        2. Identify what KIND of thinking that DOK demands.
        3. Design the question so that thinking is FORCED.
        4. Verify it passes the gate below before outputting.

        ════════════════════════════════════════════
        DOK LEVEL THINKING FINGERPRINTS
        ════════════════════════════════════════════

        Before writing the question, silently name the
        EXACT thinking action the student must perform.

        DOK 1 — The student:
          • Recalls a single fact, definition, or formula.
          • Applies one known procedure with no decisions.
          • Arrives at the answer in ONE direct step.
          Fingerprint: "I remember → I apply → I answer."

        DOK 2 — The student MUST:
          • Identify WHICH concept or relationship applies
            (this choice is not given in the question).
          • Use TWO OR MORE connected steps where the
            output of one step feeds into the next.
          • The path is not visible until the student
            interprets the situation first.
          Fingerprint: "I interpret → I decide → I calculate → I answer."
          HARD RULE: If the student can answer without
          making an interpretive decision first → it is DOK 1.
          Rewrite.

        DOK 3 — The student MUST:
          • Work through an incomplete path where at least
            ONE intermediate value or relationship is
            hidden and must be derived first.
          • The final answer depends on correctly chaining
            two or more inferences — not just two steps.
          • Some information in the question may be
            indirect, requiring interpretation before use.
          • The student cannot begin computing immediately
            after reading — they must plan the route first.
          Fingerprint: "I analyse → I find a hidden link →
          I derive an intermediate result → I use it →
          I reach the answer."
          HARD RULE: If there is no hidden intermediate
          result the student must derive → it is DOK 2.
          Rewrite.
        — "Using only the chapter's method" means the OPERATIONS and TOOLS are locked.
          It does NOT mean the reasoning path must be short or direct.
        — You may increase DOK depth by introducing a REASONING LAYER before the
          chapter method is applied — not by repeating the operation more times.

        ════════════════════════════════════════════
        MANDATORY PRE-OUTPUT GATE (run for EVERY question)
        ════════════════════════════════════════════

        After drafting the question, answer ALL questions
        in the gate for the requested DOK level.
        Even ONE "NO" → DISCARD and rewrite from scratch.

        --- DOK 2 GATE ---
        Gate Q1: Does the student need to identify WHICH
                concept or relationship applies, rather
                than being told directly?
                YES / NO

        Gate Q2: Are there at least TWO dependent steps
                where step 2 cannot begin without the
                result of step 1?
                YES / NO

        Gate Q3: Can the student answer by applying a
                single memorised rule immediately?
                (If YES → it is DOK 1. Rewrite.)
                YES / NO  ← must be NO to pass

        --- DOK 3 GATE ---
        Gate Q1: Is there at least one intermediate value
                or relationship that is NOT named in the
                question and must be derived by the student?
                YES / NO

        Gate Q2: Does the solution require chaining
                two or more inferences (not just two steps)?
                YES / NO

        Gate Q3: Would a student need to PLAN their
                approach before computing?
                YES / NO

        Gate Q4: Can the student begin calculating
                immediately after reading the question?
                (If YES → it is DOK 2. Rewrite.)
                YES / NO  ← must be NO to pass

        ════════════════════════════════════════════
        THE SINGLE STEP TEST (apply to ALL DOK 2 and DOK 3)
        ════════════════════════════════════════════

        Read your drafted question.
        Ask: "If I gave this question to a student who
        knows the topic well, could they write the answer
        in under 10 seconds without writing any working?"

        YES → the question is too direct. It is DOK 1.
              Rewrite by adding a hidden relationship or
              an intermediate value the student must find.

        NO  → the question has the required depth.
              Proceed to the distractor step.

        ════════════════════════════════════════════
        DOK UPGRADE TECHNIQUE (how to deepen any question)
        ════════════════════════════════════════════

        If a question is passing DOK 1 but needs to be DOK 2:
        → Wrap the direct value inside a relationship.
          Instead of "find x if 2x + 3 = 11",
          give a situation where the student must FIRST
          identify that the relationship IS 2x + 3 = 11
          before solving.

        If a question is passing DOK 2 but needs to be DOK 3:
        → Hide one of the known values behind an
          intermediate calculation.
          The student must derive a missing piece before
          the main method can even begin.
        → Add a constraint that forces the student to
          consider two possible paths and select one.
        → Make the scenario give information in a form
          that must be converted or reinterpreted before use.

        ════════════════════════════════════════════
        DISTRACTOR DEPTH RULE (DOK-linked)
        ════════════════════════════════════════════

        For DOK 2 and DOK 3 questions:
        At least ONE distractor must represent a student
        who reached the correct method but made an error
        at the interpretive step (before the calculation).

        This means:
        → One distractor must show what happens if the
          student SKIPS the interpretation step and
          applies the formula directly to the surface values.
        → This is different from a simple computational error.
        → It tests whether the student understood WHY
          the method applies, not just HOW to apply it.

