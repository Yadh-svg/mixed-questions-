          **- Do NOT explicitly break the explanation into “What kind of problems”, “Core idea”,"Common mistakes students make  " or “Why this works”.
          Do NOT restate or refer to the given question (Why this idea works .. etc ). **

          The KEY IDEA must not present prompts followed by answers.
            It should not restate guiding questions such as “what kind of problems these are” or “tips to avoid mistakes.”
            Instead, it should contain only the explanation itself, written as continuous teaching content that naturally includes all those ideas.

          QUALITY CHECK (MANDATORY):
          - Minimum length: 6–8 full sentences.
          - The explanation must be reusable for any similar problem.
          - If the explanation sounds suitable for a strong student, rewrite it to be simpler.

          - Do not mix answer types within a single blank.
          - Ensure every blank tests understanding, not guessing.
          - Output language must be English

